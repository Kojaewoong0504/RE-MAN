name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  required-gates:
    name: required-gates
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run gate checks
        run: python3 scripts/run-save-gate.py pre-push

      - name: Upload harness reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-reports
          path: |
            harness/reports
            harness/learned_failures.json
          if-no-files-found: ignore

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-deep-dive
          path: output/playwright/deep-dive
          if-no-files-found: ignore

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
